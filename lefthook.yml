# pre-commit: lint + format staged files (auto-fix, re-stage), then typecheck.
# lint/format act on staged files; typecheck runs via Turbo, which builds
# dependencies first (so cross-package imports resolve to built dist) and
# caches results, then checks the whole project.
pre-commit:
  parallel: false
  commands:
    lint:
      priority: 1
      glob: "*.{js,jsx,mjs,cjs,ts,tsx,mts,cts}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
    format:
      priority: 2
      glob: "*.{js,jsx,mjs,cjs,ts,tsx,mts,cts,json,md,yaml,yml,html}"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    typecheck:
      priority: 3
      glob: "*.{ts,tsx,mts,cts}"
      run: pnpm typecheck

name: Release

# Changesets-driven release, and the single owner of image publishing. On each push to main:
#   - pending changesets -> open/update a "Version Packages" PR (bumps versions, writes changelogs)
#   - that PR merged      -> publish to npm, tag the release, create GitHub Releases, build the images
#   - any other push      -> (re)build the moving `edge` images
# Each MCP image is built in this same run via the reusable docker-publish workflow (one matrix
# entry per server) on the built-in GITHUB_TOKEN, so no PAT/App is needed — and a release merge
# builds each image once, not twice.
on:
  push:
    branches: [main]

# Open/update the Version PR, push tags, and create Releases.
permissions:
  contents: write
  pull-requests: write

# Never cancel a release mid-flight.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate every release on the full check suite — the same jobs CI runs on PRs. The publish job
  # depends on this, so lint/format/typecheck/build/unit and integration must all pass before
  # anything reaches npm or GHCR.
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml

  release:
    name: Version or publish
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      # One image-build entry per MCP server: { package, version }. An empty version means that
      # MCP wasn't part of this release, so it gets a moving `edge` build instead of semver tags.
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # changesets/action pushes the version branch + tags, so it needs persisted credentials.
          fetch-depth: 0 # full history so changelog-github can resolve each changeset's commit/PR

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          registry-url: https://registry.npmjs.org # writes an .npmrc that reads NODE_AUTH_TOKEN

      - name: Create Version PR or publish release
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages # applies changesets -> the "Version Packages" PR
          publish: pnpm release # once that PR merges: build, publish to npm, and tag the release
          # Conventional-commit title/message so the squash-merge lands as `chore: …` on main.
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # npm publish auth (granular automation token)

      - name: Build the image matrix (one entry per MCP server)
        id: matrix
        uses: actions/github-script@v7
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        with:
          script: |
            // `publishedPackages` is what this run published ([{ name, version }, ...]); it's
            // empty on a non-release push. Emit one entry per MCP: the version this run published
            // for it, or "" for an edge build when it wasn't part of this release. The scoped npm
            // name is the short name under @trugamr, so one list drives both.
            const published = JSON.parse(process.env.PUBLISHED || "[]")
            const include = ["sonarr-mcp", "radarr-mcp"].map((pkg) => ({
              package: pkg,
              version: published.find((p) => p.name === `@trugamr/${pkg}`)?.version ?? "",
            }))
            core.setOutput("matrix", JSON.stringify({ include }))

  # Publish each MCP image on every push: the released version when that MCP was just released,
  # otherwise an empty version for a moving `edge` build. The matrix fans out one reusable-workflow
  # call per MCP — adding a third containerized package is a new entry in the matrix step above.
  docker:
    name: Publish image
    needs: release
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJSON(needs.release.outputs.matrix) }}
    uses: ./.github/workflows/docker-publish.yml
    with:
      package: ${{ matrix.package }}
      version: ${{ matrix.version }}

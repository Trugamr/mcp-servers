name: Publish Docker image

# Publish a single moving `edge` image to GHCR on every merge to main; also
# manually dispatchable. Versioned release tags are wired in a later slice.
on:
  push:
    branches: [main]
  workflow_dispatch:

# GHCR push needs packages:write; checkout needs only read.
permissions:
  contents: read
  packages: write

# Don't cancel an in-flight publish; let pushes finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # GHCR namespace is the repo owner, lowercased: ghcr.io/trugamr/sonarr-mcp.
  IMAGE_NAME: trugamr/sonarr-mcp

jobs:
  publish:
    name: Build and push sonarr-mcp
    runs-on: ubuntu-latest
    timeout-minutes: 30 # first build installs + builds the workspace
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # One moving `edge` tag tracking the latest main.
          tags: |
            type=raw,value=edge

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: . # repo root — the build needs the workspace + lockfile
          file: packages/sonarr-mcp/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

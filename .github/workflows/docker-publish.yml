name: Publish Docker image

# Build and push the sonarr-mcp image to GHCR. Invoked only by release.yml (and manual
# dispatch) — there is no `push:` trigger, so a release merge builds the image once, not twice:
#   - no `version` input -> a moving `edge` tag (latest unreleased build)
#   - a `version` input  -> `:X.Y.Z`, `:X.Y`, `:latest`
# release.yml calls this on every push to main: with the released version when a release just
# happened, otherwise with an empty version for an edge build. No PAT is needed — it all runs
# inside the release run on the built-in GITHUB_TOKEN.
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: Released sonarr-mcp version (e.g. 0.1.0). Empty for an edge build.
        type: string
        required: false
        default: ""

# GHCR push needs packages:write; checkout needs only read.
permissions:
  contents: read
  packages: write

# Don't cancel an in-flight publish; let it finish. (release.yml serializes its own runs per
# ref, so the calls into here are already ordered.)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # GHCR namespace is the repo owner, lowercased: ghcr.io/trugamr/sonarr-mcp.
  IMAGE_NAME: trugamr/sonarr-mcp

jobs:
  publish:
    name: Build and push sonarr-mcp
    runs-on: ubuntu-latest
    timeout-minutes: 30 # first build installs + builds the workspace
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # No `version` input -> `edge` (latest main). With one -> the semver tags + `latest`.
          tags: |
            type=raw,value=edge,enable=${{ inputs.version == '' }}
            type=semver,pattern={{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: . # repo root — the build needs the workspace + lockfile
          file: packages/sonarr-mcp/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

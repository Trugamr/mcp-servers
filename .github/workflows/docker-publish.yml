name: Publish Docker image

# Build and push one MCP server image to GHCR. Invoked only by release.yml (and manual
# dispatch) — there is no `push:` trigger, so a release merge builds each image once, not
# twice:
#   - no `version` input -> a moving `edge` tag (latest unreleased build)
#   - a `version` input  -> `:X.Y.Z`, `:X.Y`, `:latest`
# The `package` input is the short name (e.g. `radarr-mcp`); the image name and Dockerfile
# path are derived from it, so a caller can't pair the wrong two. release.yml calls this per
# MCP on every push to main: with the released version when that MCP was just released,
# otherwise with an empty version for an edge build. No PAT is needed — it all runs inside the
# release run on the built-in GITHUB_TOKEN.
on:
  workflow_dispatch:
    inputs:
      package:
        description: MCP server to build.
        type: choice
        options:
          - sonarr-mcp
          - radarr-mcp
        default: sonarr-mcp
      version:
        description: Released version (e.g. 0.1.0). Empty for an edge build.
        type: string
        required: false
        default: ""
  workflow_call:
    inputs:
      package:
        description: MCP server short name (e.g. radarr-mcp) — names the image and Dockerfile.
        type: string
        required: true
      version:
        description: Released version (e.g. 0.1.0). Empty for an edge build.
        type: string
        required: false
        default: ""

# GHCR push needs packages:write; checkout needs only read.
permissions:
  contents: read
  packages: write

# Don't cancel an in-flight publish; let it finish. (release.yml serializes its own runs per
# ref, so the calls into here are already ordered.) Keyed on the package too, so the two MCP
# builds in one release run don't serialize against each other.
concurrency:
  group: ${{ github.workflow }}-${{ inputs.package }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # GHCR namespace is the repo owner, lowercased: ghcr.io/trugamr/<package>.
  IMAGE_NAME: trugamr/${{ inputs.package }}

jobs:
  publish:
    name: Build and push ${{ inputs.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 30 # first build installs + builds the workspace
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # No `version` input -> `edge` (latest main). With one -> the semver tags + `latest`.
          tags: |
            type=raw,value=edge,enable=${{ inputs.version == '' }}
            type=semver,pattern={{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: . # repo root — the build needs the workspace + lockfile
          file: packages/${{ inputs.package }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope the gha cache per package so the two MCP builds — which run in parallel (their
          # concurrency groups differ by package) — don't clobber each other's layers on a shared
          # scope.
          cache-from: type=gha,scope=${{ inputs.package }}
          cache-to: type=gha,scope=${{ inputs.package }},mode=max
          platforms: linux/amd64

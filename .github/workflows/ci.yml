name: CI

# Run the full check suite on every pull request. These are the contexts branch protection requires
# before a PR can merge. Pushes to main don't run here — release.yml runs the same checks.yml as a
# publish gate, so a separate main run would be redundant.
on:
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only; checks.yml also declares its own least-privilege permissions.
permissions:
  contents: read

jobs:
  ci:
    name: Checks
    uses: ./.github/workflows/checks.yml
